        crossorigin="anonymous"></script>
    <!-- Link CSS propio -->
    <link rel="stylesheet" href="../css/estilos.css">
    <link rel="icon" type="image/png" href="../img/favicon.svg" />
</head>

<body>
    <!-- Barra de navegación -->
    <header>
        <a href="../index.html">
            <img src="../img/logo.png" alt="Carolina Díaz - Diseñadora Gráfica">
        </a>
        <nav>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="./trabajos.html">Trabajos</a></li>
                <li><a href="./sobre-mi.html">Sobre mí</a></li>
                <li><a href="#" class="actual">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <!-- Contenido -->
    <main>
        <section class="p-contacto">
            <div class="intro">
                <h1>Start_conectar</h1>
                <p>Tú tienes la idea. Yo tengo la capacidad visual para hacer que nadie pueda ignorarla Escríbeme y empezamos a construir. <span>Diseñadora gráfica disponible en Gran Canaria y de forma remota.</span></p>
            </div>

            <div class="form-contacto">
                <form action="#" method="post">
                    <div>
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Tu nombre">
                    </div>
                    <div>
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="tu@email.com">
                    </div>
                    <div>
                        <label for="mensaje">Mensaje</label>
                        <textarea id="mensaje" name="mensaje" placeholder="Escribe tu mensaje..."></textarea>
                    </div>
                    <button type="submit" class="button-form">Enviar</button>
                </form>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <a href="https://www.instagram.com/xdias.design/" target="_blank" rel="noopener noreferrer">
            <img src="../img/instagram.png" alt="logo de instagram">
        </a>
        <a href="https://www.behance.net/carolinadiaz_dg" target="_blank" rel="noopener noreferrer">

        <a href="https://www.linkedin.com/in/carolina-d%C3%ADaz-dg" target="_blank" rel="noopener noreferrer">

        </a>
    </footer>
